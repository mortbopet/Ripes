services:
  ripes-vnc:
    build:
      context: .
      dockerfile: ripes_QT.dockerfile
      args:
        BRANCH: master
    image: ripes-vnc:latest
    container_name: ripes-vnc
    ports:
      - "6080:80"      # noVNC web interface
      - "5900:5900"    # VNC direct connection
    volumes:
      - ./projects:/home/developer/projects
      - "${RISCV_TOOLCHAIN_DIR:-./toolchain}:/home/developer/toolchain:ro"
    restart: unless-stopped
    stdin_open: true
    tty: true

  ripes-web:
    build:
      context: .
      dockerfile: ripes_wasm.dockerfile
      args:
        BRANCH: master
    image: ripes-web:latest
    container_name: ripes-web
    ports:
      - "8080:80"      # http://localhost:8080 -> Ripes.html (Qt for WebAssembly)
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
    mem_limit: 256m
    cpus: 1.0